server {
    listen 80;
    server_name unified-workspace.duckdns.org;

    # Docker health check (do NOT redirect this)
    location = /nginx-health {
        access_log off;
        return 200 "ok";
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name unified-workspace.duckdns.org;

    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------------------
    # SSL / TLS
    # -------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/unified-workspace.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/unified-workspace.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ecdh_curve X25519:secp384r1;

    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # -------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # -------------------------------------------------------------------
    # Gzip
    # -------------------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # -------------------------------------------------------------------
    # Static assets
    # -------------------------------------------------------------------

    # Vite hashed filenames are immutable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # All other static files
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # -------------------------------------------------------------------
    # Backend proxy
    # -------------------------------------------------------------------

    # Backend health — exact match routed separately so CI/CD can verify
    # the full proxy chain (nginx -> backend) without exposing port 8000.
    location = /api/health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # WebSocket proxy -> backend (meetings signaling)
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /docs {
        include /etc/nginx/custom/allowed_ips.conf;
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /redoc {
        include /etc/nginx/custom/allowed_ips.conf;
        proxy_pass http://backend:8000/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        include /etc/nginx/custom/allowed_ips.conf;
        proxy_pass http://backend:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /adminer/ {
        include /etc/nginx/custom/allowed_ips.conf;
        proxy_pass http://adminer:8080/;
    }

    # -------------------------------------------------------------------
    # Misc
    # -------------------------------------------------------------------

    # Health check endpoint for Docker
    location /nginx-health {
        access_log off;
        return 200 "ok";
    }

    # SPA fallback — serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
