name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  BACKEND_IMAGE: chitrangpotdar/productivity-backend
  FRONTEND_IMAGE: chitrangpotdar/productivity-frontend
  DEPLOY_PATH: /home/ubuntu/Productivity-SaaS-Full-Stack-App

# =============================================================================
# PHASE 1 — Backend CI
# =============================================================================
jobs:
  backend-lint:
    name: "Phase 1: Backend Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort

      # -------------------------------------------------------------------------
      # Style/format checks are INFORMATIONAL quality gates only (non-blocking).
      # They always run and their full output is shown, but a failure here does
      # NOT stop the workflow. To make them blocking again, remove the
      # `continue-on-error: true` lines below — no other changes required.
      # -------------------------------------------------------------------------
      - name: Ruff check
        continue-on-error: true
        run: ruff check backend/app backend/tests | tee backend-lint-ruff.log

      - name: Black check
        continue-on-error: true
        run: black --check backend/app backend/tests | tee backend-lint-black.log

      - name: isort check
        continue-on-error: true
        run: isort --check-only backend/app backend/tests | tee backend-lint-isort.log

      - name: Upload lint logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-lint-logs
          path: |
            backend-lint-ruff.log
            backend-lint-black.log
            backend-lint-isort.log
          retention-days: 7

  backend-test:
    name: "Phase 1: Backend Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: backend-lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Cache pytest
        uses: actions/cache@v4
        with:
          path: backend/.pytest_cache
          key: pytest-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            pytest-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run tests with coverage
        id: run-tests
        working-directory: backend
        env:
          ENVIRONMENT: TESTING
        run: |
          pytest \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            --junitxml=report.xml \
            --tb=short \
            -v

      - name: Upload coverage XML
        if: always() && steps.run-tests.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
          retention-days: 30

      - name: Upload coverage HTML
        if: always() && steps.run-tests.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: backend/htmlcov/
          retention-days: 30

      - name: Upload pytest report
        if: always() && steps.run-tests.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: backend/report.xml
          retention-days: 30

  # =============================================================================
  # PHASE 2 — Frontend CI
  # =============================================================================
  frontend-lint:
    name: "Phase 2: Frontend Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # -------------------------------------------------------------------------
      # Style/format checks are INFORMATIONAL quality gates only (non-blocking).
      # They always run and their full output is shown, but a failure here does
      # NOT stop the workflow. To make them blocking again, remove the
      # `continue-on-error: true` lines below — no other changes required.
      # -------------------------------------------------------------------------
      - name: ESLint
        continue-on-error: true
        working-directory: frontend
        run: npm run lint | tee frontend-lint-eslint.log

      - name: Prettier check
        continue-on-error: true
        working-directory: frontend
        run: npx prettier --check "src/**/*.{js,jsx}" | tee frontend-lint-prettier.log

      - name: Upload lint logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-lint-logs
          path: |
            frontend/frontend-lint-eslint.log
            frontend/frontend-lint-prettier.log
          retention-days: 7

      - name: Vite build
        working-directory: frontend
        run: npm run build

  # =============================================================================
  # PHASE 3 — Build and Push Docker Images
  # =============================================================================
  build-and-push:
    name: "Phase 3: Build & Push Images"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend-test, frontend-lint]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =============================================================================
  # PHASE 4 — Deploy
  # =============================================================================
  deploy:
    name: "Phase 4: Deploy"
    runs-on: self-hosted
    timeout-minutes: 10
    needs: build-and-push

    env:
      APP_ENV: ${{ secrets.APP_ENV }}
      IMAGE_TAG: latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          bash ${{ github.workspace }}/.github/scripts/deploy.sh \
            "${{ github.workspace }}" \
            "${{ env.DEPLOY_PATH }}"

  # =============================================================================
  # PHASE 5 — Database Initialization & Migration
  # =============================================================================
  db-init:
    name: "Phase 5a: Database Init"
    runs-on: self-hosted
    timeout-minutes: 5
    needs: deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure database exists
        run: |
          bash ${{ github.workspace }}/.github/scripts/db-init.sh "${{ env.DEPLOY_PATH }}"

  migrate:
    name: "Phase 5b: Database Migration"
    runs-on: self-hosted
    timeout-minutes: 5
    needs: db-init

    steps:
      - name: Wait for backend to be healthy
        run: |
          echo "==> Waiting for backend container to become healthy..."
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' saas_backend 2>/dev/null || echo "unknown")
            if [ "$STATUS" = "healthy" ]; then
              echo "==> Backend is healthy."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: Backend did not become healthy within 5 minutes."
              docker compose -f ${{ env.DEPLOY_PATH }}/docker-compose.yml logs --tail=100 backend
              exit 1
            fi
            echo "    ...waiting (${i}/30)"
            sleep 10
          done

      - name: Run alembic upgrade head
        run: |
          echo "==> Running alembic upgrade head..."
          docker compose -f ${{ env.DEPLOY_PATH }}/docker-compose.yml exec -T backend alembic upgrade head

          if [ $? -ne 0 ]; then
            echo "ERROR: Database migration failed."
            docker compose -f ${{ env.DEPLOY_PATH }}/docker-compose.yml logs --tail=50 backend
            exit 1
          fi

          echo "==> Database migration completed successfully."

  # =============================================================================
  # PHASE 6 — Health Checks
  # =============================================================================
  health-check:
    name: "Phase 6: Health Checks"
    runs-on: self-hosted
    timeout-minutes: 5
    needs: migrate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run health checks
        run: bash ${{ github.workspace }}/.github/scripts/health-check.sh "${{ env.DEPLOY_PATH }}"

      - name: Print logs on failure
        if: failure()
        run: |
          echo "==> Collecting logs for debugging..."
          docker compose -f ${{ env.DEPLOY_PATH }}/docker-compose.yml logs --tail=200
          echo ""
          echo "==> Container status:"
          docker compose -f ${{ env.DEPLOY_PATH }}/docker-compose.yml ps

  # =============================================================================
  # PHASE 7 — Cleanup
  # =============================================================================
  cleanup:
    name: "Phase 7: Cleanup"
    runs-on: self-hosted
    timeout-minutes: 5
    needs: health-check
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prune Docker resources
        run: bash ${{ github.workspace }}/.github/scripts/cleanup.sh

      - name: Clean runner workspace
        run: |
          echo "==> Cleaning runner workspace..."
          rm -rf ${{ github.workspace }}/.cache
          echo "==> Workspace cleanup complete."
